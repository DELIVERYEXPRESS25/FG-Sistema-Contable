<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F&G</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
    font-family: 'Segoe UI', sans-serif;
    background: #0f1117;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.wrap {
    text-align: center;
    animation: fadeIn .4s ease;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.logo {
    width: 58px; height: 58px;
    background: linear-gradient(135deg, #4f8cff, #7c5cfc);
    border-radius: 15px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 700; color: #fff;
    margin: 0 auto 22px;
    box-shadow: 0 4px 20px rgba(79,140,255,0.35);
}
.icon {
    font-size: 48px;
    margin-bottom: 18px;
    animation: spin 1.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
h2 { font-size: 22px; color: #fff; font-weight: 600; margin-bottom: 6px; }
p { color: #4a4f6a; font-size: 13px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">F&G</div>
    <div class="icon">⏻</div>
    <h2>Cerrando...</h2>
    <p>Esta pestaña se cerrará en un momento.</p>
  </div>
  <script>
    setTimeout(() => { window.close(); }, 1500);
  </script>
</body>
</html>
